{% extends "base.html" %}
{% block title %}No Access{% endblock %}
{% block content %}
<div class="panel" style="max-width:560px;margin:40px auto;text-align:center">
  <h2 style="color:var(--green-d)">No dashboard assigned</h2>
  <p class="hint" style="margin-top:12px">Your account doesn't have any dashboard or module enabled yet. Please ask the Owner to grant you access from the Users page.</p>
  <a href="{{ url_for('logout') }}" class="btn-cancel" style="margin-top:16px;display:inline-block">Logout</a>
</div>
{% endblock %}
